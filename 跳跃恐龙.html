<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="icon" type="image/png" href="25.png">
    <title>跳跃恐龙 · 音效跑酷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #2a2f3a 0%, #1e222c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
            padding: 16px;
        }

        .game-wrapper {
            background: #f7f7f0;
            border-radius: 32px;
            padding: 20px 20px 24px;
            box-shadow: 0 25px 35px rgba(0, 0, 0, 0.4);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .score-box {
            background: #2c2f36;
            padding: 6px 16px;
            border-radius: 60px;
            color: #f5e56b;
            font-weight: bold;
            font-size: 1rem;
            font-family: monospace;
        }
        .score-box span {
            font-size: 1.4rem;
            font-weight: 800;
            margin-left: 6px;
            color: #ffd966;
        }

        .btn {
            background: #5c6b5e;
            border: none;
            color: #fefeec;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 3px 0 #2e3b2f;
            font-family: inherit;
        }
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2e3b2f;
        }
        .sound-btn {
            background: #4f6b5a;
        }
        .tip {
            font-size: 0.7rem;
            color: #8f8f7a;
            background: #ece8d8;
            padding: 4px 12px;
            border-radius: 60px;
        }
        @media (max-width: 580px) {
            .game-wrapper { padding: 14px; }
            .score-box span { font-size: 1.2rem; }
            .btn { padding: 5px 14px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="800" height="300" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/300"></canvas>
    <div class="info-panel">
        <div class="score-box">🏆 SCORE <span id="scoreValue">0</span></div>
        <div class="score-box">🥇 BEST <span id="bestValue">0</span></div>
        <button class="btn" id="restartButton">🦖 重来</button>
        <button class="btn sound-btn" id="soundToggleBtn">🔊 音效 ON</button>
        <div class="tip">␣ / ↑ 跳跃 | 点击画面跳跃</div>
    </div>
</div>

<script>
    (function(){
        // ---------- 恐龙跳跃游戏 + 音效 ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreValue');
        const bestSpan = document.getElementById('bestValue');
        const soundToggleBtn = document.getElementById('soundToggleBtn');

        // 音效开关
        let soundEnabled = true;
        let audioCtx = null;

        // 游戏配置
        let gameRunning = true;
        let score = 0;
        let bestScore = 0;
        let lastScoreFloor = 0;   // 用于分数增加时触发音效
        
        // 加载最高分
        try {
            const savedBest = localStorage.getItem('dinoBest');
            if(savedBest && !isNaN(parseInt(savedBest))) bestScore = parseInt(savedBest);
            bestSpan.innerText = bestScore;
        } catch(e) {}

        // 恐龙参数
        const DINO_WIDTH = 34;
        const DINO_HEIGHT = 44;
        const GROUND_Y = canvas.height - 45;
        let dinoX = 70;
        let dinoY = GROUND_Y - DINO_HEIGHT;
        let dinoYVelocity = 0;
        let isJumping = false;
        const GRAVITY = 0.9;
        const JUMP_POWER = -12;
        
        // 障碍物
        let obstacles = [];
        let frameCounter = 0;
        let spawnGap = 70;
        let speed = 5;
        let gameOverFlag = false;
        let animationId = null;

        // ---------- 音效初始化 (Web Audio) ----------
        function initAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) { console.warn("WebAudio not supported"); }
        }

        // 播放单次短音效 (频率类型)
        function playBeep(frequency, duration, volume) {
            if (!soundEnabled) return;
            if (!audioCtx) {
                initAudio();
                if (!audioCtx) return;
            }
            // 恢复音频上下文（如果挂起）
            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => actuallyPlay(frequency, duration, volume)).catch(e=>{});
            } else {
                actuallyPlay(frequency, duration, volume);
            }
        }

        function actuallyPlay(freq, dur, vol) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);
            osc.start(now);
            osc.stop(now + dur);
        }

        // 跳跃音效 (轻快短促)
        function playJumpSound() {
            playBeep(780, 0.12, 0.2);
        }
        // 得分音效 (叮~)
        function playScoreSound() {
            playBeep(1318.52, 0.1, 0.18);
        }
        // 碰撞音效 (低音 thud)
        function playCollisionSound() {
            playBeep(220, 0.3, 0.3);
        }

        // 切换音效开关
        function toggleSound() {
            soundEnabled = !soundEnabled;
            soundToggleBtn.innerHTML = soundEnabled ? "🔊 音效 ON" : "🔇 音效 OFF";
            if (soundEnabled && audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().catch(e=>{});
            }
            // 轻提示（无toast仅视觉反馈）
        }

        // 辅助: 更新UI
        function updateScoreUI() {
            const floorScore = Math.floor(score);
            scoreSpan.innerText = floorScore;
            if(floorScore > bestScore) {
                bestScore = floorScore;
                bestSpan.innerText = bestScore;
                try { localStorage.setItem('dinoBest', bestScore); } catch(e) {}
            }
            // 分数变化时播放音效 (每获得整数分)
            if(floorScore > lastScoreFloor && floorScore > 0 && gameRunning && !gameOverFlag) {
                playScoreSound();
            }
            lastScoreFloor = floorScore;
        }
        
        function resetGame() {
            gameRunning = true;
            gameOverFlag = false;
            score = 0;
            lastScoreFloor = 0;
            updateScoreUI();
            dinoY = GROUND_Y - DINO_HEIGHT;
            dinoYVelocity = 0;
            isJumping = false;
            obstacles = [];
            frameCounter = 0;
            speed = 5;
            spawnGap = 70;
        }
        
        function spawnObstacle() {
            const type = Math.floor(Math.random() * 3);
            let width = 18, height = 38;
            if(type === 0) { width = 16; height = 32; }
            else if(type === 1) { width = 20; height = 42; }
            else { width = 28; height = 40; }
            obstacles.push({
                x: canvas.width,
                y: GROUND_Y - height,
                width: width,
                height: height,
                type: type
            });
        }
        
        function checkCollision() {
            const dinoRect = {
                x: dinoX + 5, y: dinoY + 4,
                w: DINO_WIDTH - 10, h: DINO_HEIGHT - 8
            };
            for(let obs of obstacles) {
                const obsRect = {
                    x: obs.x + 3, y: obs.y + 3,
                    w: obs.width - 6, h: obs.height - 5
                };
                if(dinoRect.x < obsRect.x + obsRect.w &&
                    dinoRect.x + dinoRect.w > obsRect.x &&
                    dinoRect.y < obsRect.y + obsRect.h &&
                    dinoRect.y + dinoRect.h > obsRect.y) {
                    return true;
                }
            }
            return false;
        }
        
        function updateGame() {
            if(!gameRunning) return;
            
            // 跳跃物理
            if(isJumping) {
                dinoYVelocity += GRAVITY;
                dinoY += dinoYVelocity;
                if(dinoY >= GROUND_Y - DINO_HEIGHT) {
                    dinoY = GROUND_Y - DINO_HEIGHT;
                    isJumping = false;
                    dinoYVelocity = 0;
                }
                if(dinoY < 0) { dinoY = 0; if(dinoYVelocity<0) dinoYVelocity=0; }
            } else {
                dinoY = GROUND_Y - DINO_HEIGHT;
            }
            
            // 障碍物移动
            for(let i=0; i<obstacles.length; i++) {
                obstacles[i].x -= speed;
                if(obstacles[i].x + obstacles[i].width < 0) {
                    obstacles.splice(i,1);
                    i--;
                }
            }
            
            // 生成障碍物
            if(frameCounter >= spawnGap) {
                frameCounter = 0;
                let dynamicGap = Math.max(40, 70 - Math.floor(score / 300));
                if(Math.random() < 0.65) spawnObstacle();
                spawnGap = dynamicGap;
            } else {
                frameCounter++;
            }
            
            speed = Math.min(12, 5 + Math.floor(score / 450));
            score += 0.2;
            updateScoreUI();
            
            if(checkCollision()) {
                gameRunning = false;
                gameOverFlag = true;
                playCollisionSound();   // 碰撞音效
            }
        }
        
        // ------------------- 绘图模块 (保留原风格) -------------------
        function drawGround() {
            ctx.fillStyle = '#e8dbbd';
            ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y + 2);
            ctx.fillStyle = '#c0aa7a';
            for(let i=0; i<canvas.width; i+=30) ctx.fillRect(i, GROUND_Y-3, 15, 4);
            ctx.fillStyle = '#a78e64';
            ctx.fillRect(0, GROUND_Y-2, canvas.width, 3);
        }
        
        function drawDino() {
            ctx.save();
            ctx.fillStyle = '#527a3b';
            ctx.beginPath();
            ctx.roundRect(dinoX, dinoY, DINO_WIDTH, DINO_HEIGHT, 10);
            ctx.fill();
            ctx.fillStyle = '#7faa5f';
            ctx.beginPath();
            ctx.roundRect(dinoX+4, dinoY+12, DINO_WIDTH-8, DINO_HEIGHT-18, 6);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(dinoX + DINO_WIDTH-10, dinoY + 15, 7, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#1a2a0e';
            ctx.beginPath();
            ctx.arc(dinoX + DINO_WIDTH-12, dinoY + 14, 3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#fff1b0';
            ctx.beginPath();
            ctx.arc(dinoX + DINO_WIDTH-15, dinoY + 11, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#3b5e2b';
            for(let i=0;i<3;i++) ctx.fillRect(dinoX+8+i*6, dinoY-6, 5, 10);
            ctx.fillStyle = '#4a6735';
            ctx.fillRect(dinoX+6, dinoY+DINO_HEIGHT-8, 10, 8);
            ctx.fillRect(dinoX+18, dinoY+DINO_HEIGHT-8, 10, 8);
            ctx.restore();
        }
        
        function drawObstacles() {
            for(let obs of obstacles) {
                ctx.fillStyle = '#2b6d2f';
                ctx.beginPath();
                ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 6);
                ctx.fill();
                ctx.fillStyle = '#1f4f23';
                ctx.fillRect(obs.x+3, obs.y-5, 5, 12);
                ctx.fillRect(obs.x+obs.width-8, obs.y-5, 5, 12);
                if(obs.type === 2) ctx.fillRect(obs.x+10, obs.y-8, 6, 14);
                ctx.fillStyle = '#b3d96b';
                for(let i=0;i<3;i++) ctx.fillRect(obs.x+4+i*5, obs.y+5, 2, 8);
            }
        }
        
        function drawClouds() {
            ctx.fillStyle = '#dde4e0';
            let time = Date.now() / 4000;
            for(let i=0;i<3;i++) {
                let x = (canvas.width*0.2 + i*180 + time*15) % (canvas.width+200) - 100;
                ctx.beginPath();
                ctx.ellipse(x, 45, 35, 28, 0, 0, Math.PI*2);
                ctx.ellipse(x+35, 38, 40, 32, 0, 0, Math.PI*2);
                ctx.ellipse(x+65, 50, 30, 25, 0, 0, Math.PI*2);
                ctx.fill();
            }
        }
        
        function drawGameOver() {
            if(!gameOverFlag) return;
            ctx.font = 'bold 34px "Courier New", monospace';
            ctx.fillStyle = '#3a2819';
            ctx.fillText('GAME OVER', canvas.width/2-110, canvas.height/2-40);
            ctx.font = '18px monospace';
            ctx.fillStyle = '#674f32';
            ctx.fillText('点击「重来」或按 R 键', canvas.width/2-115, canvas.height/2+30);
        }
        
        function drawScoreOnCanvas() {
            ctx.font = 'bold 22px "Courier New"';
            ctx.fillStyle = '#483d2b';
            ctx.fillText(`🏆 ${Math.floor(score)}`, canvas.width-100, 45);
        }
        
        // roundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                this.closePath();
                return this;
            };
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createLinearGradient(0,0,0,GROUND_Y);
            grad.addColorStop(0, '#cfded5');
            grad.addColorStop(1, '#e6e0c3');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,canvas.width,GROUND_Y);
            drawClouds();
            drawGround();
            drawObstacles();
            drawDino();
            drawScoreOnCanvas();
            drawGameOver();
        }
        
        // 跳跃与重启逻辑
        function jump() {
            if(!gameRunning) return;
            if(!isJumping && dinoY >= GROUND_Y - DINO_HEIGHT - 1) {
                isJumping = true;
                dinoYVelocity = JUMP_POWER;
                playJumpSound();   // 跳跃音效
            }
        }
        
        function handleKeydown(e) {
            const key = e.key;
            if(key === 'ArrowUp' || key === ' ' || key === 'Space') {
                e.preventDefault();
                if(gameOverFlag) resetGame();
                else jump();
            }
            if(key === 'r' || key === 'R') {
                e.preventDefault();
                resetGame();
            }
        }
        
        function handleCanvasClick(e) {
            e.preventDefault();
            if(gameOverFlag) resetGame();
            else jump();
        }
        
        function handleTouchStart(e) {
            e.preventDefault();
            if(gameOverFlag) resetGame();
            else jump();
        }
        
        // 游戏循环
        function gameLoop() {
            updateGame();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // 初始化UI事件
        function bindEvents() {
            window.addEventListener('keydown', handleKeydown);
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
            document.getElementById('restartButton').addEventListener('click', () => resetGame());
            soundToggleBtn.addEventListener('click', () => toggleSound());
        }
        
        // 启动音频预激活（首次任何交互自动开启）
        function enableAudioOnFirstTap() {
            const resumeAudio = () => {
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume().catch(e=>{});
                }
                document.body.removeEventListener('touchstart', resumeAudio);
                document.body.removeEventListener('click', resumeAudio);
            };
            document.body.addEventListener('touchstart', resumeAudio, { once: true });
            document.body.addEventListener('click', resumeAudio, { once: true });
        }
        
        // 初始化
        function init() {
            initAudio();
            bindEvents();
            resetGame();
            gameLoop();
            enableAudioOnFirstTap();
            soundToggleBtn.innerHTML = "🔊 音效 ON";
            soundEnabled = true;
        }
        
        init();
    })();
</script>
</body>
</html>
